<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word Constellation</title>
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="stars"></div>
    <main class="page">
        <header class="hero">

            <h1>Word Constellation</h1>
            <p class="intro">
                Click the drifting words to gather a poem from the night sky. Each constellation
                forms a different piece of language.
            </p>
        </header>

        <section class="constellation-wrapper">
            <div class="sky-panel">
                <svg id="lines" class="lines"></svg>
                <div id="sky" class="sky"></div>
            </div>

            <aside class="poem-panel">
                <p class="panel-label">collected words</p>
                <div id="selectedWords" class="selected-words">No stars selected yet.</div>

                <p class="panel-label second-label">generated poem</p>
                <div id="poemOutput" class="poem-output">
                    Your poem will appear after you choose 4 words.
                </div>

                <button id="resetBtn">Create New Sky</button>
            </aside>
        </section>

        <footer class="footer">
            <p>© 2026 Crystal Perez-Rosas</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>

</html>
